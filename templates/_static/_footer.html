<!-- _footer.html -->
{% macro link(title, href) %}
<li class="list-inline-item">
    <a href="{{ href }}" class="link-secondary" target="_blank" rel="noopener">{{ title }}</a>
</li>
{% endmacro %}

<footer class="footer footer-transparent d-print-none">
    <div class="container-xl">
        <div class="row text-center align-items-center flex-row-reverse">
            <div class="col-lg-auto ms-lg-auto">
                <ul class="list-inline list-inline-dots mb-0">
                    {{ link('Source Code', 'https://github.com/mountzou/twin-hdt') }}
                    {{ link('TwinAIR project', 'https://twinair-project.eu/') }}
                </ul>
            </div>
            <div class="col-12 col-lg-auto mt-3 mt-lg-0">
                <ul class="list-inline list-inline-dots mb-0">
                    <li class="list-inline-item">
                        Copyright &copy; 2022-2026. Designed & Developed by the University of Patras.
                    </li>
                    <li class="list-inline-item">
                        v2.0.0
                    </li>
                </ul>
            </div>
        </div>
    </div>
</footer>
